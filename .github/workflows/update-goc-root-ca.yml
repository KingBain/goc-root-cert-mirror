name: Update GoC Root CA

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

concurrency:
  group: update-goc-root-ca
  cancel-in-progress: true

jobs:
  check-and-download:
    name: Check for Updates
    runs-on: ubuntu-latest
    permissions:
      contents: read 
    outputs:
      has_changes: ${{ steps.compare.outputs.has_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          persist-credentials: false

      - name: Download and compare certificate
        id: compare
        shell: bash
        run: |
          set -euo pipefail

          source_url="http://pki-icp.canada.ca/aia/GoC-GdC-Root-A.crt"
          cert_path="certs/GoC-GdC-Root-A.crt"
          fingerprint_path="certs/GoC-GdC-Root-A.sha256-fingerprint"
          user_agent="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

          mkdir -p certs
          temp_cert="$(mktemp)"
          trap 'rm -f "$temp_cert"' EXIT

          if ! curl -4 -sfL --user-agent "$user_agent" --connect-timeout 15 --max-time 60 \
            --retry 3 --retry-delay 3 --retry-all-errors "$source_url" -o "$temp_cert"; then
            echo "Upstream unreachable. Skipping."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          fingerprint_cert() {
            local f="$1"
            local fp=""
            # Try DER then PEM
            if fp=$(openssl x509 -inform DER -in "$f" -noout -sha256 -fingerprint 2>/dev/null); then
              echo "$fp" | cut -d'=' -f2
            elif fp=$(openssl x509 -in "$f" -noout -sha256 -fingerprint 2>/dev/null); then
              echo "$fp" | cut -d'=' -f2
            fi
          }

          live_fp="$(fingerprint_cert "$temp_cert" | tr -d '[:space:]' || true)"
          
          if [ -z "$live_fp" ]; then
            echo "Downloaded file is not a valid certificate."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          needs_update="false"

          if [ ! -f "$cert_path" ] || ! cmp -s "$temp_cert" "$cert_path"; then
            echo "Certificate file is missing or different."
            needs_update="true"
          fi

          if [ ! -f "$fingerprint_path" ]; then
            echo "Fingerprint file is missing."
            needs_update="true"
          else
            stored_fp="$(cat "$fingerprint_path" | tr -d '[:space:]')"
            if [ "$live_fp" != "$stored_fp" ]; then
              echo "Fingerprint file mismatch (Stored: $stored_fp vs Live: $live_fp)."
              needs_update="true"
            fi
          fi


          if [ "$needs_update" = "true" ]; then
            echo "Update required."
            cp "$temp_cert" "$cert_path"
            printf '%s\n' "$live_fp" > "$fingerprint_path"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "Repository files are correct and up-to-date."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifacts
        if: steps.compare.outputs.has_changes == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: updated-certs
          path: certs/
          retention-days: 1

  commit-changes:
    name: Commit Changes
    needs: check-and-download
    if: needs.check-and-download.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          persist-credentials: true

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          name: updated-certs
          path: certs/

      - name: Commit and Push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add certs/GoC-GdC-Root-A.crt certs/GoC-GdC-Root-A.sha256-fingerprint
          
          if git diff --cached --quiet; then
            echo "No changes to commit (files were identical)."
          else
            git commit -m "chore: update/fix GoC root CA certificate and fingerprint"
            git push
          fi