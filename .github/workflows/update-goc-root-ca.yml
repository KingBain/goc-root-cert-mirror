name: Update GoC Root CA

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

jobs:
  check-and-download:
    name: Check for Updates
    runs-on: ubuntu-latest
    permissions:
      contents: read # Read-only for the network and processing stage
    outputs:
      has_changes: ${{ steps.compare.outputs.has_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          persist-credentials: false

      - name: Download and compare certificate
        id: compare
        shell: bash
        run: |
          set -euo pipefail

          source_url="http://pki-icp.canada.ca/aia/GoC-GdC-Root-A.crt"
          cert_path="certs/GoC-GdC-Root-A.crt"
          fingerprint_path="certs/GoC-GdC-Root-A.sha256-fingerprint"
          user_agent="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

          mkdir -p certs
          temp_cert="$(mktemp)"
          trap 'rm -f "$temp_cert"' EXIT

          if ! curl -4 -sfL --user-agent "$user_agent" --connect-timeout 15 --max-time 60 \
            --retry 3 --retry-delay 3 --retry-all-errors "$source_url" -o "$temp_cert"; then
            echo "Upstream unreachable. Keeping existing copy."
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          fingerprint_cert() {
            openssl x509 -in "$1" -noout -sha256 -fingerprint 2>/dev/null | cut -d'=' -f2 || \
            openssl x509 -inform DER -in "$1" -noout -sha256 -fingerprint | cut -d'=' -f2
          }

          downloaded_fp="$(fingerprint_cert "$temp_cert" || true)"
          if [ -z "$downloaded_fp" ]; then
            echo "Invalid certificate format."
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          current_fp=""
          [ -f "$cert_path" ] && current_fp="$(fingerprint_cert "$cert_path" || true)"

          if [ "$downloaded_fp" = "$current_fp" ]; then
            echo "No changes detected."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Update detected."
            cp "$temp_cert" "$cert_path"
            printf '%s\n' "$downloaded_fp" > "$fingerprint_path"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Upload temporary files
        if: steps.compare.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: updated-certs
          path: certs/
          retention-days: 1

  commit-changes:
    name: Commit Changes
    needs: check-and-download
    if: needs.check-and-download.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          persist-credentials: true

      - name: Download updated certs from previous job
        uses: actions/download-artifact@v4
        with:
          name: updated-certs
          path: certs/

      - name: Commit and Push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add certs/GoC-GdC-Root-A.crt certs/GoC-GdC-Root-A.sha256-fingerprint
          
          if git diff --cached --quiet; then
            echo "No actual changes to commit."
          else
            git commit -m "chore: update GoC root CA certificate"
            git push
          fi